spring:
  datasource:
    url: jdbc:h2:mem:apiasistente;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false
  sql:
    init:
      mode: never

ollama:
  base-url: http://localhost:11434/api
  chat-model: test-chat
  fast-chat-model: test-fast
  visual-model: test-visual
  response-guard-model: test-guard
  embed-model: test-embed

rag:
  vector:
    index-dir: ${java.io.tmpdir}/apiasistente-rag-hnsw-${random.uuid}
    rebuild-on-startup: false

chat:
  grounding:
    enabled: true
  response-guard:
    enabled: true

monitoring:
  alerts:
    enabled: false
