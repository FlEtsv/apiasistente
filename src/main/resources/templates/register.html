<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Registro — ApiAsistente</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b1017;
            --panel: #121a24;
            --border: #1e2a3a;
            --muted: #8fa3b8;
            --text: #e7eef7;
            --accent: #1f7ae0;
            --accent-2: #18c0a6;
            --bad: #e07b7b;
        }
        * { box-sizing: border-box; }
        html, body { min-height: 100%; min-height: 100dvh; }
        body {
            font-family: 'Sora', sans-serif;
            margin: 0;
            background:
                radial-gradient(ellipse 900px 500px at 20% -20%, rgba(31,122,224,0.2), transparent),
                radial-gradient(ellipse 700px 400px at 80% 110%, rgba(24,192,166,0.14), transparent),
                var(--bg);
            color: var(--text);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: clamp(20px, 6vh, 60px) 16px 32px;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
            background-size: 36px 36px;
            pointer-events: none; opacity: 0.4; z-index: 0;
        }

        .card {
            position: relative; z-index: 1;
            width: 100%; max-width: 440px;
            background: linear-gradient(165deg, rgba(18,26,36,0.97), rgba(11,17,25,0.93));
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: clamp(24px, 5vw, 36px);
            box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
            animation: fadeUp 0.3s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Brand */
        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 28px; }
        .brand-badge {
            width: 44px; height: 44px; flex-shrink: 0;
            background: linear-gradient(135deg, var(--accent), #4da3ff);
            border-radius: 13px; display: grid; place-items: center;
            font-weight: 700; font-size: 20px;
            box-shadow: 0 8px 24px rgba(31,122,224,0.4);
        }
        .brand-text h1 { margin: 0; font-size: 18px; font-weight: 700; }
        .brand-text p  { margin: 2px 0 0; font-size: 12px; color: var(--muted); }

        /* Alert */
        .alert {
            display: flex; align-items: flex-start; gap: 10px;
            margin-bottom: 16px; padding: 12px 14px; border-radius: 12px; font-size: 13px;
        }
        .alert-icon { flex-shrink: 0; margin-top: 1px; }
        .alert.bad { background: rgba(224,123,123,0.1); border: 1px solid rgba(224,123,123,0.3); color: #f6a9a9; }

        /* Divider */
        .section-divider {
            display: flex; align-items: center; gap: 10px; margin: 18px 0 16px;
            font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
        }
        .section-divider::before, .section-divider::after {
            content: ""; flex: 1; height: 1px; background: var(--border);
        }

        /* Form */
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: flex; align-items: center; justify-content: space-between;
            font-size: 11px; font-weight: 600;
            color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px;
        }
        .form-hint { font-size: 10px; color: rgba(143,163,184,0.6); text-transform: none; letter-spacing: 0; font-weight: 400; }
        .input-wrap { position: relative; }
        .input-icon {
            position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
            color: var(--muted); pointer-events: none;
        }
        .form-input {
            width: 100%; padding: 12px 14px 12px 40px;
            background: rgba(15,22,33,0.8); border: 1px solid var(--border);
            border-radius: 12px; color: var(--text); font: inherit; font-size: 14px;
            outline: none; transition: border-color 0.16s, box-shadow 0.16s;
        }
        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(31,122,224,0.15);
        }
        .form-input::placeholder { color: rgba(143,163,184,0.5); }
        .form-input.mono { font-family: 'IBM Plex Mono', monospace; font-size: 13px; letter-spacing: 0.05em; }
        .toggle-pw {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--muted); cursor: pointer;
            padding: 4px; border-radius: 6px; display: flex; align-items: center;
            transition: color 0.14s;
        }
        .toggle-pw:hover { color: var(--text); }
        .field-note { margin-top: 6px; font-size: 11px; color: rgba(143,163,184,0.6); line-height: 1.45; }

        /* Code field — highlight it -->*/
        .code-field-wrap .form-input {
            border-color: rgba(31,122,224,0.4);
            background: rgba(31,122,224,0.06);
        }
        .code-field-wrap .form-input:focus {
            border-color: var(--accent-2);
            box-shadow: 0 0 0 3px rgba(24,192,166,0.12);
        }

        /* Submit */
        .btn-submit {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, var(--accent), #2a87f5);
            border: none; border-radius: 12px;
            color: #fff; font: inherit; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: opacity 0.16s, transform 0.1s;
            box-shadow: 0 8px 24px rgba(31,122,224,0.35);
            margin-top: 10px;
        }
        .btn-submit:hover  { opacity: 0.9; }
        .btn-submit:active { transform: scale(0.99); }

        /* Footer */
        .footer-links {
            margin-top: 22px; display: flex; justify-content: space-between; gap: 12px;
            font-size: 12px; color: var(--muted); flex-wrap: wrap;
        }
        .footer-links a {
            color: var(--muted); text-decoration: none;
            border-bottom: 1px solid rgba(143,163,184,0.3);
            padding-bottom: 1px; transition: color 0.14s, border-color 0.14s;
        }
        .footer-links a:hover { color: var(--text); border-color: var(--text); }

        @media (max-width: 480px) {
            body { padding-top: 20px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <!-- Brand -->
    <div class="brand">
        <div class="brand-badge">A</div>
        <div class="brand-text">
            <h1>ApiAsistente</h1>
            <p>Crea tu cuenta</p>
        </div>
    </div>

    <!-- Error -->
    <div th:if="${error}" class="alert bad">
        <svg class="alert-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span th:text="${error}">Error</span>
    </div>

    <form method="post" action="/register">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- Código de registro -->
        <div class="form-group code-field-wrap">
            <label class="form-label" for="code">
                Código de registro
                <span class="form-hint">Requerido</span>
            </label>
            <div class="input-wrap">
                <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                <input id="code" name="code" type="text" autocomplete="one-time-code"
                       class="form-input mono" placeholder="código temporal" required minlength="10"/>
            </div>
            <p class="field-note">Necesitas un código válido generado por un usuario autorizado.</p>
        </div>

        <div class="section-divider">Datos de cuenta</div>

        <!-- Usuario -->
        <div class="form-group">
            <label class="form-label" for="username">Usuario</label>
            <div class="input-wrap">
                <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <input id="username" name="username" type="text" autocomplete="username"
                       class="form-input" placeholder="elige un usuario" required minlength="3" maxlength="80"/>
            </div>
        </div>

        <!-- Contraseña -->
        <div class="form-group">
            <label class="form-label" for="password">Contraseña</label>
            <div class="input-wrap">
                <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input id="password" name="password" type="password" autocomplete="new-password"
                       class="form-input" placeholder="mínimo 8 caracteres" required minlength="8" maxlength="72"/>
                <button type="button" class="toggle-pw" aria-label="Mostrar contraseña" onclick="togglePw()">
                    <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
            <p class="field-note">Usa una contraseña larga y única. Mínimo 8 caracteres.</p>
        </div>

        <button type="submit" class="btn-submit">Crear cuenta</button>
    </form>

    <div class="footer-links">
        <a href="/login">Ya tengo cuenta</a>
        <a href="/chat">Volver</a>
    </div>
</div>

<script>
    function togglePw() {
        const input = document.getElementById('password');
        const icon = document.getElementById('eye-icon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
        } else {
            input.type = 'password';
            icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        }
    }
</script>
</body>
</html>
