server:
  port: 8082
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always

spring:
  # ConfiguraciÃƒÂ³n de base de datos para persistir sesiones, documentos y embeddings.
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:apiasistente_mysql}:${MYSQL_PORT:3306}/${MYSQL_DB:apiasistente_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:apiuser}
    password: ${MYSQL_PASSWORD:apipassword}

  jpa:
    hibernate:
      # Mantiene el esquema actualizado para acelerar prototipos.
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    # Evita que las vistas abran transacciones largas en web.
    open-in-view: false
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      # opcional: si quieres ser explÃƒÂ­cito
      # schema-locations: classpath:schema.sql
      # data-locations: classpath:data.sql

ollama:
  # Endpoint base del servidor Ollama (local o contenedor).
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434/api}
  #base-url: ${OLLAMA_BASE_URL:http://ollama:11434/api}
  # Modelo para generaciÃƒÂ³n de chat.
  chat-model: qwen3:14b
  # Modelo rÃƒÂ¡pido para chats ligeros (menor consumo).
  fast-chat-model: qwen2.5:7b
  # Modelo visual para etapa intermedia de imagen/camara/documento.
  visual-model: qwen2.5vl:7b
  # Alias de modelo para generación de imágenes desde el chat (ComfyUI checkpoint resolver).
  image-model: ${OLLAMA_IMAGE_MODEL:dreamshaper_8}
  # Mini-modelo opcional para depurar respuestas y quitar relleno.
  response-guard-model: ${OLLAMA_RESPONSE_GUARD_MODEL:mistral:7b}
  # Modelo para embeddings de RAG.
  embed-model: nomic-embed-text:latest
  # Menor creatividad para reducir alucinaciones.
  temperature: ${OLLAMA_TEMPERATURE:0.2}

rag:
  # NÃƒÂºmero de chunks mÃƒÂ¡s relevantes a recuperar por consulta.
  top-k: 10
  # MÃƒÂ¡ximo de mensajes previos en el historial de contexto.
  max-history: 16
  retrieval:
    # Turnos previos del usuario para enriquecer la consulta de retrieval.
    user-turns: 2
  cache:
    # Cachea embeddings/chunks para acelerar respuestas repetidas.
    enabled: true
  chunk:
    # TamaÃƒÂ±o y solapamiento de cada chunk de texto.
    size: 700
    overlap: 120
  vector:
    # Directorio local del indice HNSW. Se reconstruye desde `vectors` al arrancar.
    index-dir: data/rag-hnsw
    # Mantiene el indice HNSW alineado con la tabla durable de embeddings.
    rebuild-on-startup: true
  migration:
    # Si existe la estructura vieja `knowledge_document`, la absorbe al nuevo esquema al arrancar.
    legacy-enabled: true
  context:
    # Cuantos chunks comprimidos terminan dentro del prompt final.
    max-chunks: 5
    # Maximo de fragmentos relevantes que se conservan por chunk.
    max-snippets-per-chunk: 2
    # Recorte maximo por chunk una vez comprimido.
    max-chars-per-chunk: 420
  rerank:
    # Numero de candidatos semÃƒÂ¡nticos previos al rerank con MMR.
    candidates: 10
    # Mezcla entre relevancia y diversidad (0-1).
    lambda: 0.70
  hybrid:
    # Peso de score semÃƒÂ¡ntico vs lexical en ranking final.
    semantic-weight: 0.85
    lexical-weight: 0.15
    # Bonus cuando la frase normalizada aparece de forma exacta.
    exact-match-boost: 0.10
  owner:
    # Asegura candidatos mÃƒÂ­nimos por owner (global/privado) antes de fusionar.
    min-candidates-per-owner: 8
    # PequeÃƒÂ±os boosts para que convivan mejor contextos globales y privados.
    global-boost: 0.03
    user-boost: 0.05
  score:
    # Puntaje minimo para aceptar un chunk en la busqueda inicial.
    min: 0.22
    # Umbral minimo para considerar que existe evidencia util en la base.
    evidence-threshold: 0.45
  maintenance:
    # Activa el robot que recorre el corpus en segundo plano.
    enabled: true
    # Si es true, audita candidatos sin borrar nada.
    dry-run: false
    # Frecuencia objetivo entre barridos completos.
    interval-ms: 180000
    # Tick interno del scheduler para revisar si toca una nueva pasada.
    tick-ms: 15000
    # Tamano de cada pagina de documentos por barrido.
    page-size: 40
    # Cuantos eventos recientes se mantienen en memoria para la UI.
    max-events: 120
    # Umbrales minimos para descartar documentos/chunks sin valor.
    min-document-chars: 30
    min-document-tokens: 4
    min-chunk-chars: 20
    min-chunk-tokens: 3
    # Limite de copias exactas de una misma linea dentro de un documento.
    max-line-copies: 1
    # Tiempo para que un admin resuelva casos warning antes de pedir decision al modelo ligero.
    warning-review-hours: 48
    # Tiempo adicional tras la decision IA antes de auto-aplicar el cambio.
    ai-auto-apply-hours: 24
    # Si la cola admin supera este numero de casos OPEN, la IA adelanta revisiones.
    admin-backlog-threshold: 10
    # Limite de decisiones IA adelantadas por pasada para no saturar el modelo.
    admin-backlog-ai-max-per-pass: 3
    # Solo consulta el modelo si el monitoreo no marca CPU/MEM/DISCO/SWAP/NET degradados.
    ai-require-healthy-monitoring: true
    # Si un documento no se usa durante este tiempo, entra en cola de revision.
    unused-days-threshold: 30
    # Longitud maxima del snippet mostrado en la cola de revision.
    snippet-chars: 600
  ops:
    # Cuantos eventos recientes del core RAG se guardan en memoria para la home.
    max-events: 120
  log-learning:
    # Aprende logs de runtime dentro del corpus para responder sobre incidencias reales.
    enabled: true
    # Frecuencia de ingesta automatica de logs hacia RAG.
    tick-ms: 60000
    # Espera inicial tras arrancar para no competir con startup.
    initial-delay-ms: 20000
    # Se guarda como conocimiento global reutilizable en chat.
    owner: global
    # Metadata del documento en RAG.
    source: app-log
    tags: logs,incident,runtime
    # Cuanto leer del final de cada archivo por pasada.
    tail-bytes: 262144
    # Limites de contexto para que retrieval sea util y barato.
    max-lines: 800
    max-chars: 32000
    # Si esta activo, prioriza lineas problemáticas (error/warn/exception) y su contexto cercano.
    include-only-problematic: true
    context-lines: 2
    # Enmascara tokens/secretos antes de guardar en el corpus.
    redact-secrets: true
    # Archivos a aprender.
    paths:
      - data/audit/chat-trace.jsonl
      - data/logs/apiasistente.log
  code-learning:
    # Aprende el codigo fuente por lotes para responder con contexto real del proyecto.
    enabled: true
    # Frecuencia del barrido incremental.
    tick-ms: 180000
    # Espera inicial para no competir con el arranque.
    initial-delay-ms: 45000
    # Se guarda como conocimiento global.
    owner: global
    # Metadata del documento en RAG.
    source: code-learning
    tags: code,review,architecture
    # Raiz del repositorio a escanear.
    root-path: .
    # Directorios que se indexan para soporte tecnico.
    scan-paths:
      - src/main/java
      - src/main/resources/static
      - src/main/resources/templates
      - src/main/resources
    # Rutas excluidas para no meter ruido binario o generado.
    exclude-directories:
      - .git
      - .idea
      - .gradle
      - build
      - data
      - node_modules
      - target
    # Extensiones permitidas para aprender codigo/config.
    include-extensions:
      - .java
      - .js
      - .ts
      - .tsx
      - .html
      - .css
      - .yml
      - .yaml
      - .properties
      - .md
    # Limites por pasada para no saturar embeddings.
    max-files-per-run: 25
    max-file-size-bytes: 196608
    max-chars-per-file: 22000
    # Umbrales para notas automaticas de revision.
    max-method-lines: 90
    max-line-length: 180
    max-recommendations: 6
  web-scraper:
    # Habilita scraper web hacia RAG (la lista real de URLs vive en /setup).
    enabled: true
    # Tick interno del scheduler para comprobar si toca una nueva pasada.
    scheduler-tick-ms: 30000
    # Espera inicial tras arrancar.
    initial-delay-ms: 20000
    # Timeout HTTP por URL.
    timeout-ms: 12000
    # Recorte maximo de texto extraido por pagina.
    max-chars-per-page: 30000
    # Limite de URLs procesadas por pasada.
    max-urls-per-run: 20
    # User-Agent para scraping.
    user-agent: ApiAsistente-Scraper/1.0

chat:
  audit:
    # Trail persistente JSONL con decisiones y errores del pipeline de chat.
    enabled: true
    # Archivo append-only para trazabilidad operativa (no se borra entre requests).
    file-path: data/audit/chat-trace.jsonl
    # Longitud maxima de previews guardadas en auditoria.
    max-preview-chars: 220
  process-router:
    # Si model=auto/default/null, decide proceso (chat/rag/action/image_generate/image_extract/mixed_pipeline).
    enabled: true
    # Usa el modelo rápido para desambiguar prompts dudosos.
    llm-assessment-enabled: true
    # Si la heurística de imagen queda por debajo de este umbral, consulta al mini-modelo.
    heuristic-image-threshold: 0.86
    # Confianza mínima del mini-modelo para sobreescribir heurística.
    llm-confidence-threshold: 0.75
    # Evita consultas LLM para prompts muy cortos.
    min-prompt-chars-for-llm: 16
    # Recorte máximo del prompt enviado al mini-modelo de routing.
    max-prompt-chars: 500
  image-generation:
    # Activa generación de imágenes para el modo "image" del chat.
    enabled: true
    # Base URL del servidor ComfyUI API.
    base-url: ${CHAT_IMAGE_BASE_URL:http://localhost:8083}
    # Endpoint de ejecución de workflow (ComfyUI API).
    prompt-path: /prompt
    # Tamaño estándar de salida.
    width: 1024
    height: 1024
    # Timeout de red para la generación remota.
    timeout-ms: 120000
    # Limite de caracteres de prompt.
    max-prompt-chars: 600
    # Checkpoint por defecto para DreamShaper8 en ComfyUI.
    checkpoint: ${CHAT_IMAGE_CHECKPOINT:dreamshaper_8.safetensors}
    # Parámetros recomendados para DreamShaper8 (RTX 3090).
    steps: 28
    cfg-scale: 7.0
    sampler-name: dpmpp_2m_sde
    scheduler: karras
    denoise: 1.0
    img2img-denoise: 0.75
    # Seed fija (>=0) o aleatoria (-1).
    seed: -1
    # Prompt negativo opcional para el nodo negativo.
    negative-prompt: ""
    # Si está vacío, ComfyUI devuelve PNG por defecto.
    convert-format: ""
    convert-quality: 85
    # Carpeta local para cachear imágenes generadas por sesión.
    storage-dir: data/chat-generated-images
  rag-decision:
    # Motor de decisión híbrido: heurística + modelo ligero + verificación posterior.
    enabled: true
    # Usa el modelo rápido para autoevaluar consultas ambiguas o técnicas.
    llm-assessment-enabled: true
    # Revisa respuestas directas antes de aceptar que "no hacía falta RAG".
    verify-no-rag-answers: true
    # Umbrales base para decidir si la heurística necesita ayuda del modelo ligero.
    heuristic-confidence-threshold: 0.72
    self-confidence-threshold: 0.70
    technical-confidence-threshold: 0.80
    verify-answer-confidence-threshold: 0.74
    # Evita pagar verificación posterior en respuestas demasiado cortas.
    min-answer-chars: 140
    # Cache TTL y tamaño para no repetir la misma decisión en consultas iguales.
    cache-ttl-ms: 3600000
    max-cache-entries: 500
    # Cuantos eventos recientes de decisión se muestran en la home.
    max-events: 80
  runtime-adaptation:
    # Ajusta parametros del modelo segun carga local y latencias observadas.
    enabled: true
    # Cache corta del perfil para no recalcularlo en cada llamada.
    profile-ttl-ms: 4000
    # Suavizado EMA para latencia de modelo/turno.
    ema-alpha: 0.25
    # Umbrales de presion.
    cpu-threshold: 0.88
    memory-threshold: 0.90
    gpu-threshold: 0.90
    network-latency-threshold-ms: 1200
    model-latency-threshold-ms: 9000
    turn-latency-threshold-ms: 15000
    # Overrides de inferencia por modo.
    constrained-temperature: 0.15
    degraded-temperature: 0.10
    normal-max-tokens: 0
    constrained-max-tokens: 1200
    degraded-max-tokens: 800
    # En alta presion puede forzar alias rapido para consultas no factuales.
    force-fast-when-constrained: false
    force-fast-when-degraded: true
  rag-gate:
    # Compuerta barata para decidir si merece la pena pagar retrieval + embedding.
    enabled: true
    # Si la query tecnica es demasiado corta, no entra en RAG preferido.
    min-preferred-query-chars: 18
    # Requiere al menos este numero de tokens informativos para probar metadata/tags.
    min-preferred-query-tokens: 2
    # Cuantos tokens largos de la query se usan para buscar pistas en title/source/tags.
    max-probe-terms: 3
  queue:
    # Retraso en ms para suavizar picos de trÃƒÂ¡fico por sesiÃƒÂ³n.
    delay-ms: 15
  grounding:
    # Activa bloqueo de respuestas cuando no hay soporte suficiente en contexto.
    enabled: true
    # Requisito minimo de chunks y score para considerar contexto confiable.
    min-chunks: 2
    min-score: 0.25
    # Exige citas [S#] en respuestas con RAG.
    require-citations: true
    # Si la salida no queda anclada, reintenta una vez con el modelo principal.
    retry-primary-model: true
    # Mensaje final cuando no hay base suficiente.
    fallback-message: "No tengo suficiente contexto para responder con precision. Puedes compartir una frase mas o pegar el fragmento exacto?"
    # Mensaje especifico cuando el retrieval no encuentra evidencia util.
    no-evidence-message: "No encontre evidencia en tu base para responder eso. Puedes compartir una ruta, fecha, log o fragmento del documento?"
  response-guard:
    # Segunda pasada para eliminar informacion innecesaria en la respuesta final.
    enabled: true
    # Evita costo extra en respuestas muy cortas.
    min-answer-chars: 320
    # Modo estricto: recorte mas agresivo de relleno.
    strict-mode: true


logging:
  file:
    # Persistimos log en archivo para poder aprender incidentes con RAG.
    name: ${LOGGING_FILE_NAME:data/logs/apiasistente.log}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg [rid=%X{requestId}]%n"
  level:
    org.springframework.security: DEBUG

monitoring:
  grafana-url: ${GRAFANA_URL:http://192.168.1.61:3000}
  prometheus-url: ${PROMETHEUS_URL:http://192.168.1.61:9090}
  stack:
    # Permite activar el stack de observabilidad desde la web (requiere Docker accesible).
    project-dir: ${MONITOR_STACK_PROJECT_DIR:.}
    compose-file: ${MONITOR_STACK_COMPOSE_FILE:docker-compose.yml}
    # Script opcional para arranque del stack desde web; si esta vacio usa docker compose directo.
    start-script: ${MONITOR_STACK_START_SCRIPT:}
    command-timeout-ms: ${MONITOR_STACK_COMMAND_TIMEOUT_MS:180000}
    services: ${MONITOR_STACK_SERVICES:api,prometheus,grafana}
    api-container-name: ${MONITOR_STACK_API_CONTAINER:apiasistente}
    prometheus-container-name: ${MONITOR_STACK_PROMETHEUS_CONTAINER:apiasistente_prometheus}
    grafana-container-name: ${MONITOR_STACK_GRAFANA_CONTAINER:apiasistente_grafana}
  # Publicador periodico de metricas para Prometheus (aunque no haya trafico de chat).
  prometheus-publish-interval-ms: ${MONITOR_PROMETHEUS_PUBLISH_INTERVAL_MS:10000}
  prometheus-publish-initial-delay-ms: ${MONITOR_PROMETHEUS_PUBLISH_INITIAL_DELAY_MS:3000}
  internet-check-url: ${INTERNET_CHECK_URL:https://www.gstatic.com/generate_204}
  internet-check-timeout-ms: ${INTERNET_CHECK_TIMEOUT_MS:2000}
  gpu:
    # Si existe Nvidia local, usa nvidia-smi para reportar saturacion de GPU.
    enabled: ${MONITOR_GPU_ENABLED:true}
    command: ${MONITOR_GPU_COMMAND:nvidia-smi --query-gpu=utilization.gpu,memory.used,memory.total,name --format=csv,noheader,nounits}
    timeout-ms: ${MONITOR_GPU_TIMEOUT_MS:900}
  alerts:
    enabled: ${MONITOR_ALERTS_ENABLED:true}
    check-interval-ms: ${MONITOR_ALERTS_INTERVAL_MS:15000}
    cooldown-ms: ${MONITOR_ALERTS_COOLDOWN_MS:300000}
    cpu-threshold: ${MONITOR_CPU_THRESHOLD:0.90}
    memory-threshold: ${MONITOR_MEM_THRESHOLD:0.90}
    disk-threshold: ${MONITOR_DISK_THRESHOLD:0.90}
    swap-threshold: ${MONITOR_SWAP_THRESHOLD:0.90}
    max-events: ${MONITOR_ALERTS_MAX_EVENTS:200}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: apiasistente
  prometheus:
    metrics:
      export:
        enabled: true

bootstrap:
  admin:
    # Crea automaticamente un admin inicial si la tabla app_user esta vacia.
    enabled: ${BOOTSTRAP_ADMIN_ENABLED:true}
    username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
    # Si queda vacio y generate-random-password-if-empty=true, se genera clave temporal.
    password: ${BOOTSTRAP_ADMIN_PASSWORD:}
    generate-random-password-if-empty: true
    # Archivo local para recuperar credenciales en instalaciones nuevas.
    output-file: ${BOOTSTRAP_ADMIN_OUTPUT_FILE:data/bootstrap-admin.txt}

registration:
  codes:
    default-ttl-minutes: ${REGISTRATION_CODE_TTL_MINUTES:1440}
    min-ttl-minutes: ${REGISTRATION_CODE_MIN_TTL_MINUTES:10}
    max-ttl-minutes: ${REGISTRATION_CODE_MAX_TTL_MINUTES:10080}
