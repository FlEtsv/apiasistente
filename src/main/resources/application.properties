spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Ollama - ventana de contexto y tokens fijos (0 = usar default del modelo)
# Reducir num-ctx (ej: 4096) mejora velocidad en modelos grandes como qwen3:14b
ollama.num-ctx=4096
ollama.num-keep=0
# Timeouts HTTP para Ollama: connect rapido, read generoso para generacion local lenta
ollama.connect-timeout-ms=5000
ollama.read-timeout-ms=120000

# Router feedback - aprendizaje de errores de routing
chat.router-feedback.enabled=true
chat.router-feedback.path=data/audit/router-feedback.jsonl

# RAG decision engine - desactivar llamadas LLM extra para decidir si usar RAG.
# Las heuristicas del planner son suficientes; evita una llamada Ollama adicional por turno.
chat.rag-decision.llm-assessment-enabled=false

# Post-check RAG - desactivar verificacion LLM de respuestas directas.
# Este ciclo puede forzar un segundo retrieval + generacion completa innecesariamente.
chat.rag-decision.verify-no-rag-answers=false

# Response guard - desactivado: evita la llamada LLM extra de verificacion/depuracion por turno RAG.
# El modelo principal con el system prompt de grounding ya produce respuestas bien ancadas.
chat.response-guard.enabled=false

# Citas [S#] no son obligatorias para considerar la respuesta segura (el modelo no siempre las incluye).
chat.grounding.require-citations=false

# RAG retrieval - tuning de calidad/velocidad
# top-k=10 y max-chunks=5 aumentan cobertura sin impacto notable en latencia local.
rag.top-k=10
rag.rerank.candidates=12
rag.context.max-chunks=5

# Gate RAG: un solo termino coincidente es suficiente para habilitar retrieval.
# Reducir max-probe-terms a 2 limita las queries LIKE al minimo util.
chat.rag-gate.max-probe-terms=2
# Minimo de caracteres para pasar la compuerta en modo PREFERRED.
# 4 permite palabras clave cortas como "nasa", "rag", etc.
chat.rag-gate.min-preferred-query-chars=4
# Un solo token de probe es suficiente: "nasa", "rag", "mars" son queries validas.
# selectProbeTerms filtra tokens < 4 chars, por lo que consultas de 1 keyword sustantiva pasan.
chat.rag-gate.min-preferred-query-tokens=1



